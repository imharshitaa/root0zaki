<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Case Studies - Root0zaki</title>
  <link rel="icon" type="image/svg+xml" href="../favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg-main: #03060c;
      --bg-panel: rgba(7, 11, 22, 0.72);
      --cyan: #56f6ff;
      --green: #55ff9d;
      --text: #dff5ff;
      --text-dim: #8bb6cf;
      --line: rgba(86, 246, 255, 0.28);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      padding: 18px 0 26px;
      color: var(--text);
      font-family: "Space Grotesk", sans-serif;
      background-color: #020612;
      background:
        radial-gradient(circle at 9% 24%, rgba(64, 255, 165, 0.14), transparent 42%),
        radial-gradient(circle at 94% 12%, rgba(77, 126, 255, 0.18), transparent 38%),
        linear-gradient(90deg, rgba(64, 255, 165, 0.04) 0%, transparent 40%, transparent 60%, rgba(77, 126, 255, 0.05) 100%),
        linear-gradient(180deg, #020612 0%, #031024 52%, #020612 100%);
      position: relative;
      overflow-x: hidden;
    }

    .wrap {
      width: min(1100px, 92vw);
      margin: 0 auto;
      padding: 0;
      margin-top: clamp(56px, 10vh, 130px);
      text-align: center;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 14px;
      border-radius: 999px;
      border: 1px solid rgba(86, 246, 255, 0.3);
      font: 12px "Share Tech Mono", monospace;
      color: var(--cyan);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      background: rgba(5, 12, 24, 0.65);
    }

    h1 {
      margin: 14px 0 10px;
      color: var(--text);
      font-family: "Space Grotesk", sans-serif;
      font-size: clamp(32px, 5vw, 48px);
      font-weight: 700;
      letter-spacing: 0.02em;
      text-shadow: 0 0 14px rgba(86, 246, 255, 0.2);
    }

    .subtitle {
      margin: 0 auto 28px;
      max-width: 720px;
      color: var(--text-dim);
      font-size: 15px;
      line-height: 1.6;
    }

    .case-grid {
      display: grid;
      gap: 22px;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      justify-items: center;
    }

    .case-card {
      width: 100%;
      text-decoration: none;
      color: inherit;
      border: 1px solid rgba(86, 246, 255, 0.16);
      border-radius: 18px;
      background: rgba(8, 12, 22, 0.86);
      padding: 18px;
      box-shadow: 0 16px 34px rgba(0, 0, 0, 0.35);
      display: grid;
      gap: 14px;
      min-height: 290px;
      text-align: left;
      position: relative;
      transition: transform 0.25s ease, border-color 0.25s ease, box-shadow 0.25s ease;
    }

    .case-card:hover {
      transform: translateY(-3px);
      border-color: var(--cyan);
      box-shadow: 0 0 18px rgba(86, 246, 255, 0.18), 0 0 40px rgba(86, 246, 255, 0.12);
    }

    .case-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .case-icon {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      display: grid;
      place-items: center;
      color: var(--cyan);
      border: 1px solid rgba(86, 246, 255, 0.4);
      background: rgba(10, 20, 35, 0.7);
      font-size: 18px;
      font-family: "Share Tech Mono", monospace;
    }

    .case-pill {
      font: 600 11px "Share Tech Mono", monospace;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #7fd4ff;
      padding: 4px 10px;
      border-radius: 999px;
      border: 1px solid rgba(86, 246, 255, 0.25);
      background: rgba(10, 18, 30, 0.7);
    }

    .case-title {
      font-size: 18px;
      color: #f1f7ff;
      font-family: "Share Tech Mono", monospace;
      margin: 0;
      line-height: 1.35;
    }

    .case-desc {
      color: rgba(190, 210, 226, 0.8);
      font-size: 14px;
      line-height: 1.6;
      margin: 0;
    }

    .case-list {
      list-style: none;
      padding: 0;
      margin: 0;
      display: grid;
      gap: 8px;
      color: rgba(190, 210, 226, 0.8);
      font-size: 13px;
    }

    .case-list li::before {
      content: "➜";
      color: var(--cyan);
      margin-right: 8px;
    }

    .case-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--cyan);
      font: 12px "Share Tech Mono", monospace;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .case-link svg {
      width: 14px;
      height: 14px;
    }

    .back-link {
      display: inline-block;
      margin-top: 18px;
      padding: 10px 16px;
      border-radius: 10px;
      border: 1px solid rgba(86, 246, 255, 0.45);
      background: rgba(6, 11, 22, 0.92);
      color: var(--cyan);
      text-decoration: none;
      font: 500 15px "Share Tech Mono", monospace;
      letter-spacing: 0.04em;
      transition: border-color 0.2s ease, color 0.2s ease, transform 0.2s ease;
    }

    .back-link:hover {
      border-color: var(--green);
      color: var(--green);
      transform: translateY(-2px);
    }

    .footer {
      margin-top: 18px;
      color: var(--text-dim);
      font: 14px "Share Tech Mono", monospace;
      letter-spacing: 0.04em;
      padding-bottom: 10px;
    }
  </style>
</head>
<body>
  <main class="wrap">
    <div class="pill">Interactive Demos</div>
    <h1>Interactive Security Showcases</h1>
    <p class="subtitle">
      Explore fully functional cybersecurity tools and demonstrations. Each showcase highlights
      real detection engineering, threat modeling, and security architecture workflows.
    </p>

    <div class="case-grid" id="case-grid"></div>

    <a class="back-link" href="../index.html">⬅ Back to Home</a>
    <div class="footer">imharshitaa @ owner</div>
  </main>

  <script>
    async function loadCases() {
      try {
        const response = await fetch("case_studies.json");
        const cases = await response.json();
        const grid = document.getElementById("case-grid");

        cases.forEach((item, idx) => {
          const a = document.createElement("a");
          a.className = "case-card";
          a.href = `case_template.html?file=${item.file}`;

          const list = item.bullets.map(b => `<li>${b}</li>`).join("");

          a.innerHTML = `
            <div class="case-header">
              <div class="case-icon">${idx + 1}</div>
              <span class="case-pill">${item.tag}</span>
            </div>
            <h2 class="case-title">${item.title}</h2>
            <p class="case-desc">${item.description}</p>
            <ul class="case-list">${list}</ul>
            <div class="case-link">Explore Demo
              <svg viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M14 3h7v7h-2V6.41l-9.29 9.3-1.42-1.42 9.3-9.29H14V3ZM5 5h6v2H7v10h10v-4h2v6H5V5Z"/></svg>
            </div>
          `;

          grid.appendChild(a);
        });
      } catch (err) {
        console.error("Error loading case_studies.json", err);
        document.getElementById("case-grid").innerHTML = "<p style='color:#ff8c8c;'>Failed to load case studies.</p>";
      }
    }

    loadCases();
  </script>
</body>
</html>
